{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>✏️ 编辑读者</h2>
    <form action="/update_reader/{{ reader.reader_id }}" method="post" class="form-row" style="flex-direction:column; gap:0.8rem;">
        <div class="form-row"><label style="width:80px">姓名</label><input type="text" name="name" value="{{ reader.name }}" style="flex:1"></div>
        <div class="form-row"><label style="width:80px">性别</label><select name="gender"><option {% if reader.gender=='男' %}selected{% endif %}>男</option><option {% if reader.gender=='女' %}selected{% endif %}>女</option><option {% if reader.gender=='其他' %}selected{% endif %}>其他</option></select></div>
        <div class="form-row"><label style="width:80px">电话</label><input type="text" name="phone" value="{{ reader.phone }}" style="flex:1"></div>
        <div class="form-row"><label style="width:80px">邮箱</label><input type="email" name="email" value="{{ reader.email }}" style="flex:1"></div>
        <div class="form-row"><label style="width:80px">地址</label><input type="text" name="address" value="{{ reader.address }}" style="flex:1"></div>
        <div class="form-row"><label style="width:80px">状态</label><select name="is_active"><option {% if reader.is_active %}selected{% endif %}>正常</option><option {% if not reader.is_active %}selected{% endif %}>冻结</option></select></div>
        <div class="form-row"><button type="submit">保存修改</button><a href="/readers" class="btn btn-outline">取消</a></div>
    </form>
</div>
{% endblock %}
